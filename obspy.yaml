name: obspy
channels:
  - conda-forge
 
dependencies:
  - python=3.10.19
  - setuptools=68.2.2
 
  # Core stack (preserved)
  - obspy=1.4.1
  - numpy=1.26.4
  - scipy=1.11.4
  - pandas=2.2.3
  - matplotlib=3.8.4
  - cartopy=0.23.0
  - shapely=2.1.1
  - pyproj=3.7.1
  - pillow=11.2.1
  - lxml=5.4.0
 
  # Jupyter stack
  - jupyterlab=4.4.4
  - ipykernel=6.29.5
  - ipython=8.37.0
  - nbconvert-core=7.16.6
  - nbformat=5.10.4
 
  # Networking
  - requests=2.32.4
  - urllib3=2.5.0
  - httpx=0.28.1
 
  # Testing
  - pytest=8.4.1
  - pytest-json-report=1.5.0
  - pytest-metadata=3.1.1
 
  # Utilities
  - pyyaml=6.0.2
  - sqlalchemy=1.4.54
  - psutil=7.0.0
  - packaging=25.0
  - typing-extensions=4.14.0